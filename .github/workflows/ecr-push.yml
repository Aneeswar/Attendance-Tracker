name: Build, Push & Deploy to EKS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push app image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY_APP: attentrack
        ECR_REPOSITORY_OCR: attentrack-ocr
        IMAGE_TAG: ${{ github.sha }}
      run: |
        set -euo pipefail
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_APP:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_APP:$IMAGE_TAG

        docker build -f services/ocr-service/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY_OCR:$IMAGE_TAG ./services/ocr-service
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_OCR:$IMAGE_TAG

    - name: Update Deployment
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY_APP: attentrack
        ECR_REPOSITORY_OCR: attentrack-ocr
        IMAGE_TAG: ${{ github.sha }}
        OCR_API_KEY: ${{ secrets.OCR_API_KEY }}
      run: |
        set -euo pipefail

        if [ -z "${OCR_API_KEY:-}" ]; then
          echo "OCR_API_KEY secret is missing. Configure it in GitHub environment secrets."
          exit 1
        fi

        # 1. Connect to EKS
        aws eks update-kubeconfig --region ap-south-1 --name attentrack-cluster
        
        # 2. AUTO-DISCOVER RDS ENDPOINT
        RDS_ENDPOINT=$(aws rds describe-db-instances --db-instance-identifier attentrack-cluster-db --query "DBInstances[0].Endpoint.Address" --output text)
        echo "Found RDS Endpoint: $RDS_ENDPOINT"

        # 3. Create/update runtime secret for OCR service
        kubectl create secret generic ocr-api-secret \
          --from-literal=api-key="$OCR_API_KEY" \
          --dry-run=client -o yaml | kubectl apply -f -

        # 4. Render manifests with concrete values, then apply
        APP_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY_APP:$IMAGE_TAG"
        OCR_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY_OCR:$IMAGE_TAG"

        APP_RENDERED="/tmp/deployment_and_service.rendered.yaml"
        OCR_RENDERED="/tmp/ocr-deployment-and-service.rendered.yaml"

        sed -e "s|REPLACEME_ECR_REPO_URL:latest|$APP_IMAGE|g" \
          -e "s|REPLACEME_ECR_REPO_URL|$APP_IMAGE|g" \
            -e "s|REPLACEME_RDS_ENDPOINT|$RDS_ENDPOINT|g" \
            k8s/deployment_and_service.yaml > "$APP_RENDERED"

        sed -e "s|REPLACEME_OCR_ECR_REPO_URL:latest|$OCR_IMAGE|g" \
          -e "s|REPLACEME_OCR_ECR_REPO_URL|$OCR_IMAGE|g" \
            k8s/ocr-deployment-and-service.yaml > "$OCR_RENDERED"

        kubectl apply -f "$OCR_RENDERED"
        kubectl apply -f "$APP_RENDERED"

        # 5. Keep OCR service URL explicit at runtime for the app deployment
        kubectl set env deployment/attentrack-deployment OCR_API_BASE_URL=http://ocr-service.default.svc.cluster.local:5000

        # 6. Roll out OCR first, then app
        if ! kubectl rollout status deployment/ocr-deployment --timeout=15m; then
          echo "OCR rollout failed. Collecting diagnostics..."
          kubectl get deploy,pods,rs -n default -o wide
          kubectl describe deployment/ocr-deployment -n default || true
          kubectl describe pods -n default -l app=ocr-service || true
          OCR_PODS=$(kubectl get pods -n default -l app=ocr-service -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)
          for pod in $OCR_PODS; do
            echo "=== Logs for $pod ==="
            kubectl logs "$pod" -n default --tail=200 || true
            kubectl logs "$pod" -n default --previous --tail=200 || true
          done
          kubectl get events -n default --sort-by=.metadata.creationTimestamp | tail -n 60 || true
          exit 1
        fi

        if ! kubectl rollout status deployment/attentrack-deployment --timeout=15m; then
          echo "Attentrack rollout failed. Collecting diagnostics..."
          kubectl get deploy,pods,rs -n default -o wide
          kubectl describe deployment/attentrack-deployment -n default || true
          kubectl describe pods -n default -l app=attentrack || true
          APP_PODS=$(kubectl get pods -n default -l app=attentrack -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)
          for pod in $APP_PODS; do
            echo "=== Logs for $pod ==="
            kubectl logs "$pod" -n default --tail=200 || true
            kubectl logs "$pod" -n default --previous --tail=200 || true
          done
          kubectl get events -n default --sort-by=.metadata.creationTimestamp | tail -n 60 || true
          exit 1
        fi

        APP_URL=$(kubectl get svc attentrack-service -n default -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        if [ -n "${APP_URL:-}" ]; then
          echo "Application URL: http://$APP_URL"
        else
          echo "Application LoadBalancer hostname is still pending. Run: kubectl get svc attentrack-service -n default -w"
        fi
