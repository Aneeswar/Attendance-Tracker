name: Build, Push & Deploy to EKS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Preflight Infrastructure Readiness
      run: |
        set -euo pipefail

        # Use shared Terraform backend so outputs are available in CI
        AWS_REGION="${AWS_REGION:-${AWS_DEFAULT_REGION:-ap-south-1}}"
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        TF_STATE_BUCKET="attentrack-tfstate-${ACCOUNT_ID}-${AWS_REGION}"
        TF_STATE_KEY="attendance-tracker/terraform.tfstate"
        TF_LOCK_TABLE="attentrack-terraform-locks"

        if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" >/dev/null 2>&1; then
          echo "Terraform backend bucket '$TF_STATE_BUCKET' is missing or inaccessible."
          echo "Create it once with admin credentials, then rerun this workflow."
          exit 1
        fi

        if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
          echo "Terraform lock table '$TF_LOCK_TABLE' is missing or inaccessible."
          echo "Create it once with admin credentials, then rerun this workflow."
          exit 1
        fi

        terraform -chdir=terraform init -input=false -no-color -reconfigure \
          -backend-config="bucket=$TF_STATE_BUCKET" \
          -backend-config="key=$TF_STATE_KEY" \
          -backend-config="region=$AWS_REGION" \
          -backend-config="dynamodb_table=$TF_LOCK_TABLE" \
          -backend-config="encrypt=true"

        EKS_REGION=$(terraform -chdir=terraform output -raw region)
        CLUSTER_NAME=$(terraform -chdir=terraform output -raw cluster_name)
        RDS_ENDPOINT=$(terraform -chdir=terraform output -raw rds_endpoint)
        DB_NAME=$(terraform -chdir=terraform output -raw db_name)
        DB_MASTER_SECRET_ARN=$(terraform -chdir=terraform output -raw db_master_secret_arn)

        if [ -z "${EKS_REGION:-}" ] || [ -z "${CLUSTER_NAME:-}" ] || [ -z "${RDS_ENDPOINT:-}" ] || [ -z "${DB_NAME:-}" ] || [ -z "${DB_MASTER_SECRET_ARN:-}" ]; then
          echo "Required Terraform outputs (region, cluster_name, rds_endpoint, db_name, db_master_secret_arn) are missing."
          exit 1
        fi

        DB_SECRET_JSON=$(aws secretsmanager get-secret-value \
          --region "$EKS_REGION" \
          --secret-id "$DB_MASTER_SECRET_ARN" \
          --query 'SecretString' \
          --output text)
        if [ -z "${DB_SECRET_JSON:-}" ] || [ "$DB_SECRET_JSON" = "None" ]; then
          echo "Unable to read DB secret payload from Secrets Manager: $DB_MASTER_SECRET_ARN"
          exit 1
        fi

        aws eks update-kubeconfig --region "$EKS_REGION" --name "$CLUSTER_NAME"
        kubectl auth can-i get pods -n default >/dev/null

        {
          echo "EKS_REGION=$EKS_REGION"
          echo "CLUSTER_NAME=$CLUSTER_NAME"
          echo "RDS_ENDPOINT=$RDS_ENDPOINT"
          echo "DB_NAME=$DB_NAME"
          echo "DB_MASTER_SECRET_ARN=$DB_MASTER_SECRET_ARN"
        } >> "$GITHUB_ENV"

        echo "Preflight summary: Terraform outputs, Secrets Manager read, and EKS auth all passed."

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push app image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY_APP: attentrack
        ECR_REPOSITORY_OCR: attentrack-ocr
        IMAGE_TAG: ${{ github.sha }}
      run: |
        set -euo pipefail
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_APP:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_APP:$IMAGE_TAG

        docker build -f services/ocr-service/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY_OCR:$IMAGE_TAG ./services/ocr-service
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_OCR:$IMAGE_TAG

    - name: Update Deployment
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY_APP: attentrack
        ECR_REPOSITORY_OCR: attentrack-ocr
        IMAGE_TAG: ${{ github.sha }}
        OCR_API_KEY: ${{ secrets.OCR_API_KEY }}
      run: |
        set -euo pipefail

        if [ -z "${OCR_API_KEY:-}" ]; then
          echo "OCR_API_KEY secret is missing. Configure it in GitHub environment secrets."
          exit 1
        fi

        if [ -z "${EKS_REGION:-}" ] || [ -z "${CLUSTER_NAME:-}" ] || [ -z "${RDS_ENDPOINT:-}" ] || [ -z "${DB_NAME:-}" ] || [ -z "${DB_MASTER_SECRET_ARN:-}" ]; then
          echo "Preflight environment is missing required values."
          exit 1
        fi

        DB_SECRET_JSON=$(aws secretsmanager get-secret-value \
          --region "$EKS_REGION" \
          --secret-id "$DB_MASTER_SECRET_ARN" \
          --query 'SecretString' \
          --output text)

        DB_USERNAME=$(python -c "import json,sys; print(json.loads(sys.argv[1])['username'])" "$DB_SECRET_JSON")
        DB_PASSWORD=$(python -c "import json,sys; print(json.loads(sys.argv[1])['password'])" "$DB_SECRET_JSON")

        if [ -z "${DB_USERNAME:-}" ] || [ -z "${DB_PASSWORD:-}" ]; then
          echo "Failed to resolve DB credentials from Secrets Manager secret: $DB_MASTER_SECRET_ARN"
          exit 1
        fi

        # 2. Connect to EKS
        aws eks update-kubeconfig --region "$EKS_REGION" --name "$CLUSTER_NAME"
        kubectl auth can-i get pods -n default >/dev/null

        # 3. Create/update runtime secrets
        kubectl create secret generic ocr-api-secret \
          --from-literal=api-key="$OCR_API_KEY" \
          --dry-run=client -o yaml | kubectl apply -f -

        kubectl create secret generic db-credentials \
          --from-literal=username="$DB_USERNAME" \
          --from-literal=password="$DB_PASSWORD" \
          --dry-run=client -o yaml | kubectl apply -f -

        kubectl get secret ocr-api-secret -n default >/dev/null
        kubectl get secret db-credentials -n default >/dev/null

        # 4. Render manifests with concrete values, then apply
        APP_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY_APP:$IMAGE_TAG"
        OCR_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY_OCR:$IMAGE_TAG"
        echo "Using APP image: $APP_IMAGE"
        echo "Using OCR image: $OCR_IMAGE"

        APP_RENDERED="/tmp/deployment_and_service.rendered.yaml"
        OCR_RENDERED="/tmp/ocr-deployment-and-service.rendered.yaml"

        sed -e "s|REPLACEME_ECR_REPO_URL:latest|$APP_IMAGE|g" \
          -e "s|REPLACEME_ECR_REPO_URL|$APP_IMAGE|g" \
          -e "s|REPLACEME_RDS_ENDPOINT|$RDS_ENDPOINT|g" \
          -e "s|REPLACEME_DB_NAME|$DB_NAME|g" \
          k8s/deployment_and_service.yaml > "$APP_RENDERED"

        sed -e "s|REPLACEME_OCR_ECR_REPO_URL:latest|$OCR_IMAGE|g" \
          -e "s|REPLACEME_OCR_ECR_REPO_URL|$OCR_IMAGE|g" \
            k8s/ocr-deployment-and-service.yaml > "$OCR_RENDERED"

        if grep -q "REPLACEME_" "$APP_RENDERED" "$OCR_RENDERED"; then
          echo "Rendered manifests still contain unresolved REPLACEME placeholders. Aborting deployment."
          grep -n "REPLACEME_" "$APP_RENDERED" "$OCR_RENDERED" || true
          exit 1
        fi

        kubectl apply -f "$OCR_RENDERED"
        kubectl apply -f "$APP_RENDERED"

        # 5. Keep OCR service URL explicit at runtime for the app deployment
        kubectl set env deployment/attentrack-deployment OCR_API_BASE_URL=http://ocr-service.default.svc.cluster.local:5000

        # 6. Roll out OCR first, then app
        if ! kubectl rollout status deployment/ocr-deployment -n default --timeout=15m; then
          echo "OCR rollout failed. Collecting diagnostics..."
          kubectl get deploy,pods,rs -n default -o wide
          kubectl describe deployment/ocr-deployment -n default || true
          kubectl describe pods -n default -l app=ocr-service || true
          OCR_PODS=$(kubectl get pods -n default -l app=ocr-service -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)
          for pod in $OCR_PODS; do
            echo "=== Logs for $pod ==="
            kubectl logs "$pod" -n default --tail=200 || true
            kubectl logs "$pod" -n default --previous --tail=200 || true
          done
          kubectl get events -n default --sort-by=.metadata.creationTimestamp | tail -n 60 || true
          exit 1
        fi

        if ! kubectl rollout status deployment/attentrack-deployment -n default --timeout=15m; then
          echo "Attentrack rollout failed. Collecting diagnostics..."
          kubectl get deploy,pods,rs -n default -o wide
          kubectl describe deployment/attentrack-deployment -n default || true
          kubectl describe pods -n default -l app=attentrack || true
          APP_PODS=$(kubectl get pods -n default -l app=attentrack -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)
          for pod in $APP_PODS; do
            echo "=== Logs for $pod ==="
            kubectl logs "$pod" -n default --tail=200 || true
            kubectl logs "$pod" -n default --previous --tail=200 || true
          done
          kubectl get events -n default --sort-by=.metadata.creationTimestamp | tail -n 60 || true
          exit 1
        fi

        DEPLOYED_DB_HOST=$(kubectl get deployment attentrack-deployment -n default -o jsonpath='{.spec.template.spec.containers[0].env[?(@.name=="DB_HOST")].value}')
        if [ "$DEPLOYED_DB_HOST" != "$RDS_ENDPOINT" ]; then
          echo "DB host mismatch detected. deployment DB_HOST='$DEPLOYED_DB_HOST', terraform rds_endpoint='$RDS_ENDPOINT'"
          exit 1
        fi
        echo "Verified deployment DB_HOST matches Terraform rds_endpoint"

        APP_URL=$(kubectl get svc attentrack-service -n default -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        if [ -n "${APP_URL:-}" ]; then
          echo "Application URL: http://$APP_URL"
        else
          echo "Application LoadBalancer hostname is still pending. Run: kubectl get svc attentrack-service -n default -w"
        fi
