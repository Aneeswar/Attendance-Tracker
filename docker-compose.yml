services:
  app:
    build: .
    ports:
      - "8080:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - OCR_API_BASE_URL=http://ocr-service:5000
      - OCR_API_KEY=${OCR_API_KEY:-ocr-local-2026-key}
    restart: always
    depends_on:
      redis:
        condition: service_started
      ocr-service:
        condition: service_healthy

  ocr-service:
    build: ./services/ocr-service
    ports:
      - "5000:5000"
    environment:
      - OCR_API_KEY=${OCR_API_KEY:-ocr-local-2026-key}
      - OCR_MAX_IMAGE_WIDTH=${OCR_MAX_IMAGE_WIDTH:-1800}
      - OCR_CACHE_MAX_ITEMS=${OCR_CACHE_MAX_ITEMS:-128}
      - OCR_ALLOWED_ORIGINS=${OCR_ALLOWED_ORIGINS:-http://localhost:8081,http://127.0.0.1:8081,http://localhost:8080,http://127.0.0.1:8080}
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    profiles:
      - monitoring
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus

