services:
  app:
    build: .
    ports:
      - "8080:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-attendance_db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-0000}
      - DB_POOL_MAX_SIZE=${DB_POOL_MAX_SIZE:-10}
      - DB_POOL_MIN_IDLE=${DB_POOL_MIN_IDLE:-3}
      - DB_POOL_CONNECTION_TIMEOUT_MS=${DB_POOL_CONNECTION_TIMEOUT_MS:-15000}
      - DB_POOL_IDLE_TIMEOUT_MS=${DB_POOL_IDLE_TIMEOUT_MS:-300000}
      - DB_POOL_MAX_LIFETIME_MS=${DB_POOL_MAX_LIFETIME_MS:-1800000}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      - SPRING_JPA_OPEN_IN_VIEW=${SPRING_JPA_OPEN_IN_VIEW:-false}
      - SPRING_JPA_PROPERTIES_HIBERNATE_GENERATE_STATISTICS=${SPRING_JPA_PROPERTIES_HIBERNATE_GENERATE_STATISTICS:-false}
      - LOGGING_LEVEL_COM_DEEPAK_ATTENDANCE=${LOGGING_LEVEL_COM_DEEPAK_ATTENDANCE:-INFO}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - OCR_API_BASE_URL=http://ocr-service:5000
      - OCR_API_KEY=${OCR_API_KEY:-ocr-local-2026-key}
      - OCR_API_TIMEOUT_MS=${OCR_API_TIMEOUT_MS:-90000}
    restart: always
    depends_on:
      redis:
        condition: service_started
      ocr-service:
        condition: service_healthy

  ocr-service:
    build: ./services/ocr-service
    ports:
      - "5000:5000"
    volumes:
      - ocr-model-cache:/home/ocruser/.paddleocr
    environment:
      - OCR_API_KEY=${OCR_API_KEY:-ocr-local-2026-key}
      - OCR_MAX_IMAGE_WIDTH=${OCR_MAX_IMAGE_WIDTH:-1800}
      - OCR_CACHE_MAX_ITEMS=${OCR_CACHE_MAX_ITEMS:-128}
      - OCR_ALLOWED_ORIGINS=${OCR_ALLOWED_ORIGINS:-http://localhost:8081,http://127.0.0.1:8081,http://localhost:8080,http://127.0.0.1:8080}
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=10)"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 240s

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    profiles:
      - monitoring
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus

volumes:
  ocr-model-cache:

