apiVersion: v1
kind: Service
metadata:
  name: ocr-service
  namespace: default
spec:
  selector:
    app: ocr-service
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocr-service
  template:
    metadata:
      labels:
        app: ocr-service
    spec:
      containers:
        - name: ocr-service
          image: REPLACEME_OCR_ECR_REPO_URL:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: OCR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ocr-api-secret
                  key: api-key
            - name: OCR_MAX_IMAGE_WIDTH
              value: "1800"
            - name: OCR_CACHE_MAX_ITEMS
              value: "128"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 45
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "300m"
            limits:
              memory: "1Gi"
              cpu: "1000m"