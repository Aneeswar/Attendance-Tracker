<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple OCR Uploader</title>
    <style>
        :root {
            --bg: #f3f5f7;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #0f766e;
            --primary-hover: #115e59;
            --danger: #b91c1c;
            --border: #d1d5db;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ecfeff, var(--bg));
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(760px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1.5rem;
        }

        p {
            margin-top: 0;
            color: var(--muted);
        }

        form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 12px;
            margin-bottom: 20px;
        }

        input[type="file"] {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            background: #fff;
            width: 100%;
            max-width: 420px;
        }

        button {
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover { background: var(--primary-hover); }

        .error {
            color: var(--danger);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .result {
            margin-top: 8px;
            background: #f9fafb;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            white-space: pre-wrap;
            font-family: Consolas, "Courier New", monospace;
            min-height: 140px;
            overflow-x: auto;
        }

        .label {
            margin-bottom: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>OCR Text Extractor</h1>
        <p>Upload a screenshot or image and see only course code, name, slot, and registered date as JSON.</p>

        <form method="post" enctype="multipart/form-data">
            <input type="file" name="image" accept="image/*" required />
            <button type="submit">Extract Text</button>
        </form>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <div class="label">Processed JSON</div>
        <div class="result">{{ extracted_json }}</div>
    </main>
</body>
</html>
